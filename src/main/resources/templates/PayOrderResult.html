<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, #4e54c8, #8f94fb); }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: 60px auto; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">ADV Shop</a>
    </div>
</nav>

<div class="container">
    <div class="card p-5 text-center">
        <div class="mb-3">
            <span style="font-size: 3rem;">✅</span>
        </div>
        <h3 class="fw-bold mb-2">Payment Submitted!</h3>
        <p class="text-muted mb-1">Your Payment ID:</p>
        <p class="fw-bold fs-5 text-primary" th:text="${paymentId}"></p>
        <hr>
        <a th:href="@{/payment/detail/{id}(id=${paymentId})}" class="btn btn-primary w-100 mb-2">View Payment Detail</a>
        <a th:href="@{/order/history}" class="text-muted text-decoration-none small">← Back to Order History</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
