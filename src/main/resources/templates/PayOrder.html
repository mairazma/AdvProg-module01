<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, #4e54c8, #8f94fb); }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 550px; margin: 40px auto; }
        .form-control, .form-select { border-radius: 8px; padding: 10px; }
        .btn-submit { background: #4e54c8; border: none; border-radius: 8px; padding: 12px; font-weight: bold; color: white; }
        .btn-submit:hover { background: #3f44a3; color: white; }
        #bankTransferFields, #voucherFields { display: none; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">ADV Shop</a>
    </div>
</nav>

<div class="container">
    <div class="card p-5">
        <h3 class="fw-bold mb-2 text-center">Pay Order</h3>
        <p class="text-muted text-center mb-4">Order ID: <span th:text="${order.id}"></span></p>

        <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Payment Method</label>
                <select name="method" class="form-select" id="methodSelect" required onchange="showFields(this.value)">
                    <option value="">-- Select Method --</option>
                    <option value="BANK_TRANSFER">Bank Transfer</option>
                    <option value="VOUCHER_CODE">Voucher Code</option>
                </select>
            </div>

            <div id="bankTransferFields">
                <div class="mb-3">
                    <label class="form-label fw-bold">Bank Name</label>
                    <input type="text" name="bankName" class="form-control" placeholder="e.g. BCA">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Reference Code</label>
                    <input type="text" name="referenceCode" class="form-control" placeholder="e.g. REF123456">
                </div>
            </div>

            <div id="voucherFields">
                <div class="mb-3">
                    <label class="form-label fw-bold">Voucher Code</label>
                    <input type="text" name="voucherCode" class="form-control" placeholder="e.g. ESHOP1234ABC5678">
                </div>
            </div>

            <button type="submit" class="btn btn-submit w-100 mt-2 shadow-sm">Pay Now</button>
            <div class="text-center mt-3">
                <a th:href="@{/order/history}" class="text-muted text-decoration-none small">← Back to History</a>
            </div>
        </form>
    </div>
</div>

<script>
    function showFields(method) {
        document.getElementById('bankTransferFields').style.display = method === 'BANK_TRANSFER' ? 'block' : 'none';
        document.getElementById('voucherFields').style.display = method === 'VOUCHER_CODE' ? 'block' : 'none';
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
