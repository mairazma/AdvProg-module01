<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, #4e54c8, #8f94fb); }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 550px; margin: 40px auto; }
        .btn-submit { background: #4e54c8; border: none; border-radius: 8px; padding: 12px; font-weight: bold; color: white; }
        .btn-submit:hover { background: #3f44a3; color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">ADV Shop</a>
    </div>
</nav>

<div class="container">
    <div class="card p-5">
        <h3 class="fw-bold mb-4 text-center">Create Order</h3>
        <form th:action="@{/order/create}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Author</label>
                <input type="text" name="author" class="form-control" placeholder="Enter author name" required>
            </div>
            <button type="submit" class="btn btn-submit w-100 shadow-sm">Create Order</button>
            <div class="text-center mt-3">
                <a th:href="@{/}" class="text-muted text-decoration-none small">← Back to Home</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
