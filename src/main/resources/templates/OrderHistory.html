<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, #4e54c8, #8f94fb); }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .table thead { background: #eef2f7; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">ADV Shop</a>
    </div>
</nav>

<div class="container">
    <div class="card p-4">
        <h2 class="fw-bold mb-4">Order History</h2>

        <form th:action="@{/order/history}" method="post" class="mb-4">
            <div class="input-group" style="max-width: 400px;">
                <input type="text" name="author" class="form-control" placeholder="Enter author name"
                       th:value="${author}" required>
                <button type="submit" class="btn btn-primary">Search</button>
            </div>
        </form>

        <div th:if="${orders != null}">
            <div th:if="${orders.isEmpty()}">
                <p class="text-muted">No orders found for "<span th:text="${author}"></span>".</p>
            </div>
            <div th:if="${!orders.isEmpty()}">
                <table class="table table-hover border">
                    <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Order Time</th>
                        <th>Author</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}"></td>
                        <td th:text="${order.orderTime}"></td>
                        <td th:text="${order.author}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${order.status == 'SUCCESS'} ? 'bg-success' :
                                                  (${order.status == 'FAILED'} ? 'bg-danger' :
                                                  (${order.status == 'CANCELLED'} ? 'bg-secondary' : 'bg-warning text-dark'))"
                                  th:text="${order.status}">
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/order/pay/{id}(id=${order.id})}"
                               class="btn btn-sm btn-primary">Pay</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
