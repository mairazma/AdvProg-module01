<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, #4e54c8, #8f94fb); }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 550px; margin: 40px auto; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">ADV Shop</a>
    </div>
</nav>

<div class="container">
    <div class="card p-5">
        <h3 class="fw-bold mb-4 text-center">Payment Detail</h3>

        <div th:if="${payment == null}">
            <form th:action="@{/payment/detail}" method="get">
                <div class="mb-3">
                    <label class="form-label fw-bold">Payment ID</label>
                    <input type="text" name="paymentId" class="form-control" placeholder="Enter payment ID" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Search</button>
            </form>
        </div>

        <div th:if="${payment != null}">
            <table class="table table-bordered">
                <tr>
                    <th>Payment ID</th>
                    <td th:text="${payment.id}"></td>
                </tr>
                <tr>
                    <th>Method</th>
                    <td th:text="${payment.method}"></td>
                </tr>
                <tr>
                    <th>Status</th>
                    <td>
                        <span class="badge"
                              th:classappend="${payment.status == 'SUCCESS'} ? 'bg-success' :
                                              (${payment.status == 'REJECTED'} ? 'bg-danger' : 'bg-warning text-dark')"
                              th:text="${payment.status}">
                        </span>
                    </td>
                </tr>
            </table>
            <a th:href="@{/order/history}" class="text-muted text-decoration-none small">← Back to Order History</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
